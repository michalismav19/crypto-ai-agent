name: Deploy to AWS Lambda

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install all dependencies
        run: yarn install --frozen-lockfile

      - name: Build TypeScript
        run: yarn build

      - name: Install production dependencies only
        run: yarn install --frozen-lockfile --production

      - name: Create deployment zip
        run: zip -r lambda.zip dist/ node_modules/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to Lambda
        run: |
          if aws lambda get-function --function-name crypto-ai-agent > /dev/null 2>&1; then
            echo "Function exists — updating code..."
            aws lambda update-function-code \
              --function-name crypto-ai-agent \
              --zip-file fileb://lambda.zip
          else
            echo "Function not found — creating..."
            aws lambda create-function \
              --function-name crypto-ai-agent \
              --runtime nodejs20.x \
              --role ${{ secrets.LAMBDA_ROLE_ARN }} \
              --handler dist/lambda.handler \
              --timeout 180 \
              --memory-size 256 \
              --zip-file fileb://lambda.zip
          fi
